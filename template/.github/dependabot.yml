version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/"
    allow:
      - dependency-type: "all"
    schedule:
      interval: "weekly"
    groups:
      cargo-transitive:
        dependency-type: "indirect"
        patterns:
          - "*"
      cargo-direct-patch:
        dependency-type: "direct"
        update-types:
          - "patch"
        patterns:
          - "*"
